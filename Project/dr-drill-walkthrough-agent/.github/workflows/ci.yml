name: DR Drill Agent Continuous Integration

on:
  push:
    branches: [ main, master, release/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        run: npm run lint

  automated-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Run OWASP dependency audit
        run: npm audit sec-cfg || true

  production-build-verification:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, automated-security-scan]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile and Bundle Server (ESBuild)
        run: npm run build

      - name: Build and Tag Target Docker Image
        run: docker build -t dr-drill-agent:ci-latest .
